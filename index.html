<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>武道カリステニクス — Workout Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=DM+Mono:wght@300;400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#ffb7c5;--pink-dim:rgba(255,183,197,0.18);--pink-glow:rgba(255,183,197,0.4);
  --bg:#0d0d1a;--surface:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.07);
  --text:#ece8f5;--text-dim:rgba(236,232,245,0.4);--text-muted:rgba(236,232,245,0.25);
  --green:#5cb87a;--blue:#5c8fe0;--gold:#d4a017;--purple:#9b59b6;
}
html,body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',Georgia,serif;min-height:100vh;overflow-x:hidden}

/* Sakura */
.petal{position:fixed;top:-20px;border-radius:60% 40% 60% 40%/50% 60% 40% 50%;
  background:radial-gradient(circle at 30% 30%,#ffb7c5,#e8829a);pointer-events:none;z-index:0;animation:sakuraFall linear infinite}
@keyframes sakuraFall{
  0%{transform:translateY(-20px) rotate(0deg) translateX(0)}
  25%{transform:translateY(25vh) rotate(90deg) translateX(30px)}
  50%{transform:translateY(50vh) rotate(180deg) translateX(-20px)}
  75%{transform:translateY(75vh) rotate(270deg) translateX(25px)}
  100%{transform:translateY(110vh) rotate(360deg) translateX(0)}
}
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.025;
  background-image:linear-gradient(#ffb7c5 1px,transparent 1px),linear-gradient(90deg,#ffb7c5 1px,transparent 1px);
  background-size:40px 40px}

/* Layout */
#app{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:0 16px 80px}

/* Onboarding overlay */
#onboarding{position:fixed;inset:0;background:rgba(13,13,26,0.97);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px}
.ob-card{background:rgba(255,183,197,0.06);border:0.5px solid rgba(255,183,197,0.25);
  border-radius:16px;padding:32px 28px;width:100%;max-width:400px;animation:fadeIn .5s ease}
.ob-title{font-size:22px;letter-spacing:2px;text-align:center;margin-bottom:4px}
.ob-sub{font-size:11px;color:var(--text-dim);letter-spacing:3px;text-align:center;
  font-family:'DM Mono',monospace;margin-bottom:28px}
.ob-field{margin-bottom:16px}
.ob-label{font-size:11px;color:rgba(255,183,197,.7);letter-spacing:3px;
  font-family:'DM Mono',monospace;display:block;margin-bottom:6px}
.ob-input{width:100%;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.15);
  border-radius:8px;padding:11px 14px;color:var(--text);font-family:'DM Mono',monospace;
  font-size:14px;outline:none;transition:border-color .2s}
.ob-input:focus{border-color:rgba(255,183,197,0.5)}
.ob-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ob-select{appearance:none;cursor:pointer}
.ob-btn{width:100%;margin-top:8px;padding:13px;background:rgba(255,183,197,0.2);
  border:0.5px solid rgba(255,183,197,0.5);border-radius:10px;color:var(--pink);
  cursor:pointer;font-family:'Noto Serif JP',serif;font-size:15px;letter-spacing:2px;
  transition:background .2s}
.ob-btn:hover{background:rgba(255,183,197,0.32)}
.ob-error{font-size:11px;color:#e05c5c;font-family:'DM Mono',monospace;
  margin-top:6px;display:none}

/* Header */
.header{text-align:center;padding:36px 0 20px;animation:fadeIn .6s ease}
.header-sub{font-size:11px;letter-spacing:8px;color:rgba(255,183,197,.67);
  margin-bottom:6px;font-family:'DM Mono',monospace}
.header-title{font-size:clamp(22px,5vw,30px);font-weight:300;letter-spacing:2px;
  animation:glow 3s ease-in-out infinite}
.header-meta{font-size:11px;color:var(--text-dim);margin-top:5px;
  font-family:'DM Mono',monospace;letter-spacing:1px}
.header-meta span{color:var(--pink);cursor:pointer;text-decoration:underline dotted}
.saved-toast{font-size:11px;color:var(--pink);margin-top:6px;letter-spacing:2px;
  font-family:'DM Mono',monospace;opacity:0;transition:opacity .3s}
.saved-toast.show{opacity:1}
@keyframes glow{0%,100%{text-shadow:0 0 8px rgba(255,183,197,.67)}50%{text-shadow:0 0 22px #ffb7c5,0 0 40px rgba(232,130,154,.4)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* XP Panel */
.xp-panel{background:rgba(255,183,197,0.06);border:0.5px solid rgba(255,183,197,0.2);
  border-radius:12px;padding:14px 18px;margin-bottom:18px;animation:slideUp .5s ease}
.xp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px}
.xp-stat{text-align:center}
.xp-stat-label{font-size:10px;color:rgba(255,183,197,.53);letter-spacing:2px;
  font-family:'DM Mono',monospace;display:block}
.xp-stat-val{font-size:20px;font-weight:400;color:var(--text)}
.xp-level-val{font-size:24px;color:var(--pink)}
.xp-bar-row{display:flex;gap:8px;align-items:center}
.xp-bar-label{font-size:11px;color:rgba(255,183,197,.53);white-space:nowrap;font-family:'DM Mono',monospace}
.prog-bar-wrap{width:100%;background:rgba(255,255,255,0.07);border-radius:4px;height:8px;overflow:hidden;flex:1}
.prog-bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:22px;background:rgba(255,255,255,0.04);border-radius:10px;padding:4px}
.tab-btn{flex:1;padding:9px 0;border:none;border-radius:8px;cursor:pointer;
  font-family:'Noto Serif JP',serif;letter-spacing:1px;background:transparent;
  color:rgba(236,232,245,0.45);transition:all .2s}
.tab-btn .jp{display:block;font-size:15px}
.tab-btn .en{display:block;font-size:9px;font-family:'DM Mono',monospace;opacity:.7}
.tab-btn.active{background:rgba(255,183,197,0.15);color:var(--pink)}
.tab-btn:hover:not(.active){background:rgba(255,255,255,0.05)}
.section{display:none;animation:slideUp .3s ease}
.section.visible{display:block}

/* Date nav */
.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.date-nav-btn{background:rgba(255,255,255,0.06);border:0.5px solid var(--border);
  border-radius:8px;padding:8px 14px;color:var(--text-dim);cursor:pointer;
  font-family:'DM Mono',monospace;font-size:13px;transition:all .2s}
.date-nav-btn:hover{border-color:rgba(255,183,197,.4);color:var(--pink)}
.date-nav-center{flex:1;text-align:center}
.date-nav-main{font-size:15px;letter-spacing:1px}
.date-nav-sub{font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;letter-spacing:2px}
.today-btn{font-size:10px;color:var(--pink);cursor:pointer;font-family:'DM Mono',monospace;
  letter-spacing:1px;border:0.5px solid rgba(255,183,197,.3);border-radius:20px;padding:3px 10px;margin-top:3px;
  display:inline-block;transition:background .2s}
.today-btn:hover{background:rgba(255,183,197,.1)}

/* Day header */
.day-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.day-badge{font-size:26px}
.day-type-name{font-size:17px;letter-spacing:1px}
.day-sub{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;letter-spacing:1px;margin-top:2px}
.done-tag{margin-left:auto;font-size:11px;color:var(--pink);
  border:0.5px solid rgba(255,183,197,0.4);border-radius:20px;
  padding:4px 12px;font-family:'DM Mono',monospace;letter-spacing:2px}
.rest-msg{text-align:center;padding:32px 0;color:var(--text-dim);font-size:15px}
.rest-msg .rest-icon{font-size:36px;margin-bottom:10px}

/* Exercise cards */
.exercise-list{display:flex;flex-direction:column;gap:10px}
.exercise-card{background:var(--surface);border:0.5px solid var(--border);
  border-radius:10px;padding:14px 16px;transition:background .2s}
.exercise-card:hover{background:rgba(255,255,255,0.05)}
.exercise-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.exercise-name{font-size:14px;letter-spacing:.5px}
.exercise-sets-label{font-size:11px;color:rgba(236,232,245,.35);font-family:'DM Mono',monospace}
.set-circles{display:flex;gap:8px;flex-wrap:wrap}
.set-circle{width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,.2);
  background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-size:14px;color:var(--pink)}
.set-circle.done{border-color:var(--pink);background:rgba(255,183,197,.25);
  transform:scale(1.1);box-shadow:0 0 12px var(--pink-glow)}

/* Week tab */
.week-section-label{font-size:11px;letter-spacing:4px;color:rgba(255,183,197,.67);
  font-family:'DM Mono',monospace;margin-bottom:10px;margin-top:18px}
.week-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.week-card{background:var(--surface);border:0.5px solid var(--border);
  border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.week-card:hover{background:rgba(255,255,255,.05);transform:translateY(-2px)}
.week-card.done{border-color:rgba(255,183,197,.35)}
.week-card.done::before{content:'';position:absolute;inset:0;background:rgba(255,183,197,.04);pointer-events:none}
.week-card.future{opacity:.45}
.week-card-top{display:flex;justify-content:space-between;align-items:flex-start}
.week-kanji{font-size:24px;color:rgba(236,232,245,.12)}
.week-badge{font-size:16px}
.week-type{font-size:13px;margin-top:4px;letter-spacing:.5px}
.week-meta{font-size:10px;color:rgba(236,232,245,.28);font-family:'DM Mono',monospace;margin-top:2px}
.week-done-label{margin-top:6px;font-size:10px;color:var(--pink);font-family:'DM Mono',monospace;letter-spacing:1px}
.week-progress-bar{margin-top:6px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.week-progress-fill{height:100%;background:linear-gradient(90deg,rgba(255,183,197,.5),#ffb7c5);border-radius:2px;transition:width .4s}
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.week-nav-btn{background:rgba(255,255,255,0.06);border:0.5px solid var(--border);
  border-radius:8px;padding:7px 14px;color:var(--text-dim);cursor:pointer;
  font-family:'DM Mono',monospace;font-size:12px;transition:all .2s}
.week-nav-btn:hover{border-color:rgba(255,183,197,.4);color:var(--pink)}
.week-nav-label{flex:1;text-align:center;font-size:13px;letter-spacing:1px}

/* Month tab */
.month-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.month-nav-btn{background:rgba(255,255,255,0.06);border:0.5px solid var(--border);
  border-radius:8px;padding:7px 14px;color:var(--text-dim);cursor:pointer;
  font-family:'DM Mono',monospace;font-size:12px;transition:all .2s}
.month-nav-btn:hover{border-color:rgba(255,183,197,.4);color:var(--pink)}
.month-title{flex:1;text-align:center;font-size:15px;letter-spacing:2px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:18px}
.cal-day-name{text-align:center;font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;
  padding:4px 0;letter-spacing:1px}
.cal-cell{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;transition:all .2s;
  border:0.5px solid transparent;position:relative}
.cal-cell:hover{background:rgba(255,183,197,.1);border-color:rgba(255,183,197,.2)}
.cal-cell.empty{pointer-events:none}
.cal-cell.today-cell{border-color:rgba(255,183,197,.4)!important}
.cal-cell .cal-num{font-size:12px;font-family:'DM Mono',monospace;color:var(--text-dim)}
.cal-cell.done-cell{background:rgba(255,183,197,.18);border-color:rgba(255,183,197,.3)}
.cal-cell.done-cell .cal-num{color:var(--pink)}
.cal-cell.partial-cell{background:rgba(255,183,197,.08);border-color:rgba(255,183,197,.15)}
.cal-cell.future-cell{opacity:.3;pointer-events:none}
.cal-cell.rest-cell{background:rgba(100,100,130,.1)}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--pink);margin-top:2px}
.month-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.m-stat{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;
  padding:12px;text-align:center}
.m-stat-val{font-size:20px;color:var(--pink)}
.m-stat-label{font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-top:2px;letter-spacing:1px}

/* Stats tab */
.weight-card{background:var(--surface);border:0.5px solid rgba(255,255,255,.08);
  border-radius:12px;padding:16px;margin-bottom:14px}
.card-label{font-size:11px;letter-spacing:4px;color:rgba(255,183,197,.67);
  font-family:'DM Mono',monospace;margin-bottom:12px;display:block}
.weight-input-row{display:flex;gap:8px;margin-bottom:12px}
.weight-input{flex:1;background:rgba(255,255,255,.06);border:0.5px solid rgba(255,255,255,.12);
  border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Mono',monospace;
  font-size:14px;outline:none}
.weight-input::placeholder{color:rgba(236,232,245,.3)}
.weight-input:focus{border-color:rgba(255,183,197,.4)}
.weight-btn{padding:10px 18px;background:rgba(255,183,197,.2);border:0.5px solid rgba(255,183,197,.4);
  border-radius:8px;color:var(--pink);cursor:pointer;font-family:'DM Mono',monospace;font-size:13px;transition:background .2s}
.weight-btn:hover{background:rgba(255,183,197,.32)}
.weight-chart{display:flex;align-items:flex-end;gap:3px;height:80px;margin-bottom:6px}
.weight-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.weight-bar-val{font-size:9px;color:rgba(255,183,197,.5);font-family:'DM Mono',monospace}
.weight-bar{width:100%;background:rgba(255,183,197,.2);border-radius:3px 3px 0 0;transition:height .5s}
.weight-bar.latest{background:rgba(255,183,197,.65)}
.weight-footer{display:flex;justify-content:space-between;font-size:11px;
  color:rgba(236,232,245,.3);font-family:'DM Mono',monospace}
.weight-gain-label{font-size:10px;color:rgba(255,183,197,.5);font-family:'DM Mono',monospace;
  margin-top:4px;text-align:right}
.weight-empty{font-size:13px;color:var(--text-muted);text-align:center;padding:14px 0;font-family:'DM Mono',monospace}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.stat-val{font-size:22px;font-weight:400}
.stat-jp{font-size:13px;letter-spacing:1px;margin-top:2px}
.stat-en{font-size:10px;color:rgba(236,232,245,.3);font-family:'DM Mono',monospace}
.level-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.level-bar-labels{display:flex;justify-content:space-between;margin-top:6px;
  font-size:11px;color:rgba(236,232,245,.3);font-family:'DM Mono',monospace}
.level-hint{margin-top:12px;font-size:11px;color:rgba(236,232,245,.3);font-family:'DM Mono',monospace;text-align:center}
.profile-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.profile-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.profile-item{text-align:center}
.profile-val{font-size:18px;color:var(--text)}
.profile-label{font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;letter-spacing:1px}
.bmi-badge{padding:4px 14px;border-radius:20px;font-size:12px;font-family:'DM Mono',monospace;letter-spacing:1px}
.intensity-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.intensity-row{display:flex;gap:8px;flex-wrap:wrap}
.intensity-chip{padding:5px 14px;border-radius:20px;font-size:12px;font-family:'DM Mono',monospace;letter-spacing:1px;border:0.5px solid}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div id="petals"></div>

<!-- Onboarding -->
<div id="onboarding">
  <div class="ob-card">
    <div class="ob-title">武道カリステニクス</div>
    <div class="ob-sub">PERSONALIZED TRAINING SETUP</div>
    <div class="ob-field">
      <label class="ob-label">NAME</label>
      <input class="ob-input" id="ob-name" placeholder="Your name" maxlength="30"/>
    </div>
    <div class="ob-row">
      <div class="ob-field">
        <label class="ob-label">HEIGHT (cm)</label>
        <input class="ob-input" id="ob-height" type="number" placeholder="175" min="120" max="220"/>
      </div>
      <div class="ob-field">
        <label class="ob-label">WEIGHT (kg)</label>
        <input class="ob-input" id="ob-weight" type="number" placeholder="70" min="30" max="200" step="0.1"/>
      </div>
    </div>
    <div class="ob-row">
      <div class="ob-field">
        <label class="ob-label">AGE</label>
        <input class="ob-input" id="ob-age" type="number" placeholder="25" min="13" max="80"/>
      </div>
      <div class="ob-field">
        <label class="ob-label">FITNESS LEVEL</label>
        <select class="ob-input ob-select" id="ob-level">
          <option value="beginner">Beginner</option>
          <option value="intermediate">Intermediate</option>
          <option value="advanced">Advanced</option>
        </select>
      </div>
    </div>
    <div class="ob-field">
      <label class="ob-label">PRIMARY GOAL</label>
      <select class="ob-input ob-select" id="ob-goal">
        <option value="lose">Lose weight / cut</option>
        <option value="gain">Gain muscle / bulk</option>
        <option value="maintain">Maintain / recomp</option>
        <option value="endurance">Improve endurance</option>
      </select>
    </div>
    <p class="ob-error" id="ob-error">Please fill all fields correctly.</p>
    <button class="ob-btn" onclick="submitOnboarding()">修行を始める — Begin Training</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div class="header-sub">修行トラッカー</div>
    <h1 class="header-title">武道カリステニクス</h1>
    <div class="header-meta" id="headerMeta"></div>
    <div class="saved-toast" id="savedToast">保存済み ✓</div>
  </div>

  <!-- XP Panel -->
  <div class="xp-panel">
    <div class="xp-row">
      <div class="xp-stat">
        <span class="xp-stat-label">レベル</span>
        <span class="xp-level-val" id="levelVal">1</span>
      </div>
      <div class="xp-stat">
        <span class="xp-stat-label">修練日数</span>
        <span class="xp-stat-val"><span id="doneCount">0</span> <span style="font-size:12px;opacity:.4">days</span></span>
      </div>
      <div class="xp-stat">
        <span class="xp-stat-label">連続</span>
        <span class="xp-stat-val"><span id="streakVal">0</span> <span style="font-size:12px;opacity:.4">🔥</span></span>
      </div>
      <div class="xp-stat">
        <span class="xp-stat-label">今週</span>
        <span class="xp-stat-val"><span id="weekCount">0</span> <span style="font-size:12px;opacity:.4">/ 6</span></span>
      </div>
    </div>
    <div class="xp-bar-row">
      <div class="prog-bar-wrap">
        <div class="prog-bar-fill" id="xpBarFill" style="background:linear-gradient(90deg,rgba(255,183,197,.6),#ffb7c5);width:0%"></div>
      </div>
      <span class="xp-bar-label" id="xpLabel">0/300 XP</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('today')"><span class="jp">今日</span><span class="en">Today</span></button>
    <button class="tab-btn" onclick="switchTab('week')"><span class="jp">週間</span><span class="en">Week</span></button>
    <button class="tab-btn" onclick="switchTab('month')"><span class="jp">月間</span><span class="en">Month</span></button>
    <button class="tab-btn" onclick="switchTab('stats')"><span class="jp">統計</span><span class="en">Stats</span></button>
  </div>

  <!-- TODAY -->
  <div class="section visible" id="tab-today">
    <div class="date-nav" id="dateNav"></div>
    <div class="day-header" id="dayHeader"></div>
    <div class="exercise-list" id="exerciseList"></div>
  </div>

  <!-- WEEK -->
  <div class="section" id="tab-week">
    <div class="week-nav" id="weekNav"></div>
    <div class="week-section-label" id="weekLabel"></div>
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <!-- MONTH -->
  <div class="section" id="tab-month">
    <div class="month-header" id="monthHeader"></div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="month-stats" id="monthStats"></div>
  </div>

  <!-- STATS -->
  <div class="section" id="tab-stats">
    <div class="profile-card">
      <span class="card-label">プロフィール</span>
      <div class="profile-row" id="profileRow"></div>
    </div>
    <div class="intensity-card">
      <span class="card-label">プランの強度</span>
      <div class="intensity-row" id="intensityRow"></div>
    </div>
    <div class="weight-card">
      <span class="card-label">体重記録</span>
      <div class="weight-input-row">
        <input class="weight-input" type="number" id="weightInput" placeholder="Weight (kg)" min="30" max="200" step="0.1"/>
        <button class="weight-btn" onclick="addWeight()">記録</button>
      </div>
      <div id="weightDisplay"></div>
    </div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="level-card">
      <span class="card-label">次のレベルまで</span>
      <div class="prog-bar-wrap">
        <div class="prog-bar-fill" id="levelBarFill" style="background:linear-gradient(90deg,rgba(255,183,197,.6),#ffb7c5);width:0%"></div>
      </div>
      <div class="level-bar-labels"><span id="lvLeft">Lv 1</span><span id="lvMid">300 XP to next</span><span id="lvRight">Lv 2</span></div>
      <div class="level-hint">Complete a full day to earn 100 XP · Extra 50 XP for weekly streaks</div>
    </div>
  </div>
</div>

<script>
// ── Workout plan generator ──
function generatePlan(profile) {
  const { level, goal, bmi } = profile;
  // intensity multipliers
  const mult = level === 'beginner' ? 0.7 : level === 'advanced' ? 1.35 : 1;
  const isLose = goal === 'lose';
  const isGain = goal === 'gain';
  const isEnd  = goal === 'endurance';

  function r(base) { return Math.max(1, Math.round(base * mult)); }
  function rs(base) { return Math.max(1, Math.round(base * (isGain ? 1.2 : isLose ? 0.9 : 1) * mult)); }

  const plans = {
    Mon: { type:"Push", badge:"推進", color:"#e05c5c", exercises:[
      {name:"Push-ups",                sets:3, reps:rs(isLose?15:12)},
      {name:"Pike push-ups",           sets:3, reps:rs(8)},
      {name:"Tricep dips (chair)",     sets:3, reps:rs(10)},
      ...(level!=='beginner'?[{name:"Diamond push-ups", sets:r(2), reps:rs(8)}]:[]),
      ...(isLose?[{name:"Plank shoulder taps",sets:r(2),reps:rs(16)}]:[]),
    ]},
    Tue: { type:"Pull + Core", badge:"引力", color:"#5c8fe0", exercises:[
      {name:"Towel rows (door handle)", sets:3, reps:rs(10)},
      {name:"Door frame rows",          sets:3, reps:rs(8)},
      {name:"Plank hold",               sets:3, reps:`${r(isEnd?45:30)}s`},
      {name:"Hollow body hold",         sets:3, reps:`${r(20)}s`},
      ...(level==='advanced'?[{name:"Hanging knee raises",sets:r(3),reps:rs(12)}]:[]),
    ]},
    Wed: { type: isLose||isEnd ? "Cardio Burn" : "Active Rest", badge: isLose||isEnd ? "燃焼" : "休息", color:"#7a7a9a", exercises:
      isLose||isEnd ? [
        {name:"Jumping jacks",       sets:3, reps:`${r(40)}s`},
        {name:"High knees",          sets:3, reps:`${r(30)}s`},
        {name:"Burpees",             sets:r(3), reps:rs(8)},
        {name:"Mountain climbers",   sets:r(2), reps:rs(20)},
      ] : [
        {name:"Light walk / stretch", sets:1, reps:"15min"},
        {name:"Hip flexor stretch",   sets:2, reps:"40s"},
        {name:"Wrist circles",        sets:2, reps:"30s"},
      ]
    },
    Thu: { type:"Legs", badge:"下肢", color:"#5cb87a", exercises:[
      {name:"Squats",            sets:3, reps:rs(isLose?20:15)},
      {name:"Reverse lunges",    sets:3, reps:rs(10)},
      {name:"Glute bridges",     sets:3, reps:rs(12)},
      {name:"Calf raises",       sets:3, reps:rs(15)},
      ...(level!=='beginner'?[{name:isGain?"Bulgarian split squats":"Jump squats", sets:r(2), reps:rs(10)}]:[]),
    ]},
    Fri: { type:"Full Body", badge:"全身", color:"#d4a017", exercises:[
      {name:"Burpees",                 sets:r(3), reps:rs(isLose?12:8)},
      {name:"Push-up to Downdog",      sets:3,    reps:rs(8)},
      {name:"Jump squats",             sets:r(3), reps:rs(10)},
      {name:"Mountain climbers",       sets:r(2), reps:rs(isEnd?30:20)},
      ...(level==='advanced'?[{name:"Explosive clap push-ups",sets:r(2),reps:rs(6)}]:[]),
    ]},
    Sat: { type: isGain ? "Upper Strength" : "Core + Balance", badge: isGain ? "上肢" : "均衡", color:"#9b59b6", exercises:
      isGain ? [
        {name:"Wide push-ups",         sets:r(4), reps:rs(12)},
        {name:"Tricep push-ups",       sets:r(3), reps:rs(10)},
        {name:"Door frame rows",       sets:r(4), reps:rs(10)},
        {name:"Pike push-ups",         sets:r(3), reps:rs(10)},
      ] : [
        {name:"Dead bug",              sets:3, reps:rs(10)},
        {name:"Side plank",            sets:2, reps:`${r(25)}s`},
        {name:"Single-leg deadlift",   sets:3, reps:rs(8)},
        {name:"Superman hold",         sets:3, reps:`${r(15)}s`},
      ]
    },
    Sun: { type:"Full Rest", badge:"完休", color:"#555577", exercises:[
      {name:"Complete rest",  sets:0, reps:"—"},
      {name:"Sleep 7–8 hrs",  sets:0, reps:"priority"},
    ]},
  };
  return plans;
}

// ── Date helpers ──
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const KANJI = {Mon:"月",Tue:"火",Wed:"水",Thu:"木",Fri:"金",Sat:"土",Sun:"日"};
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTH_JP = ["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];

function dateToKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function keyToDate(k) {
  const [y,m,d] = k.split('-').map(Number);
  return new Date(y,m-1,d);
}
function todayKey() { return dateToKey(new Date()); }
function dayOfWeek(dateKey) {
  const d = keyToDate(dateKey);
  const dow = d.getDay(); // 0=Sun
  return DAYS[dow === 0 ? 6 : dow - 1];
}
function getWeekStart(dateKey) {
  const d = keyToDate(dateKey);
  const dow = d.getDay();
  const diff = dow === 0 ? -6 : 1 - dow; // Monday
  d.setDate(d.getDate() + diff);
  return dateToKey(d);
}
function addDays(dateKey, n) {
  const d = keyToDate(dateKey);
  d.setDate(d.getDate() + n);
  return dateToKey(d);
}
function formatDate(dateKey) {
  const d = keyToDate(dateKey);
  return `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}

// ── State ──
let state = {
  activeDate: todayKey(),
  viewWeekStart: null,
  viewMonth: null, // {year, month}
  completedSets: {},   // key: "YYYY-MM-DD_ei_si"
  completedDays: {},   // key: "YYYY-MM-DD": timestamp
  partialDays: {},     // key: "YYYY-MM-DD": progress 0-100
  weight: [],
  totalXp: 0,
  streak: 0,
};

let profile = null; // {name, height, weight, age, level, goal, bmi}
let PLAN = {};

// ── Storage ──
function saveState() {
  try {
    localStorage.setItem('wt_v4_state', JSON.stringify({
      completedSets: state.completedSets,
      completedDays: state.completedDays,
      partialDays: state.partialDays,
      weight: state.weight,
      totalXp: state.totalXp,
      streak: state.streak,
    }));
    showToast();
  } catch(e) {}
}
function loadState() {
  try {
    const d = localStorage.getItem('wt_v4_state');
    if (d) {
      const p = JSON.parse(d);
      state.completedSets = p.completedSets || {};
      state.completedDays = p.completedDays || {};
      state.partialDays = p.partialDays || {};
      state.weight = p.weight || [];
      state.totalXp = p.totalXp || 0;
      state.streak = p.streak || 0;
    }
  } catch(e) {}
}
function saveProfile(prof) {
  try { localStorage.setItem('wt_v4_profile', JSON.stringify(prof)); } catch(e) {}
}
function loadProfile() {
  try {
    const d = localStorage.getItem('wt_v4_profile');
    return d ? JSON.parse(d) : null;
  } catch(e) { return null; }
}
function showToast() {
  const t = document.getElementById('savedToast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// ── Onboarding ──
function submitOnboarding() {
  const name   = document.getElementById('ob-name').value.trim();
  const height = parseFloat(document.getElementById('ob-height').value);
  const weight = parseFloat(document.getElementById('ob-weight').value);
  const age    = parseInt(document.getElementById('ob-age').value);
  const level  = document.getElementById('ob-level').value;
  const goal   = document.getElementById('ob-goal').value;
  const err    = document.getElementById('ob-error');

  if (!name || isNaN(height)||height<120||height>220 || isNaN(weight)||weight<30||weight>200 || isNaN(age)||age<13||age>80) {
    err.style.display = 'block'; return;
  }
  err.style.display = 'none';

  const bmi = weight / ((height/100)**2);
  const prof = { name, height, weight, age, level, goal, bmi };
  saveProfile(prof);
  initApp(prof);
}

// ── Init ──
function initApp(prof) {
  profile = prof;
  PLAN = generatePlan(prof);
  loadState();

  document.getElementById('onboarding').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  state.viewWeekStart = getWeekStart(state.activeDate);
  const now = new Date();
  state.viewMonth = { year: now.getFullYear(), month: now.getMonth() };

  spawnPetals();
  updateHeader();
  updateXpPanel();
  renderToday();
}

function updateHeader() {
  const bmiCat = profile.bmi < 18.5 ? 'Underweight' : profile.bmi < 25 ? 'Normal BMI' : profile.bmi < 30 ? 'Overweight' : 'Obese';
  document.getElementById('headerMeta').innerHTML =
    `${profile.name} · ${profile.height}cm / ${profile.weight}kg · <span onclick="resetProfile()" title="Reset profile">BMI ${profile.bmi.toFixed(1)} (${bmiCat})</span>`;
}

function resetProfile() {
  if (confirm('Reset profile? Your workout data will be kept.')) {
    localStorage.removeItem('wt_v4_profile');
    location.reload();
  }
}

// ── Sakura ──
function spawnPetals() {
  const c = document.getElementById('petals');
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 10 + Math.random() * 12;
    p.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;opacity:${0.15+Math.random()*.3};animation-duration:${7+Math.random()*6}s;animation-delay:${Math.random()*10}s`;
    c.appendChild(p);
  }
}

// ── Tab switching ──
let currentTab = 'today';
function switchTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('visible');
  document.querySelectorAll('.tab-btn')[['today','week','month','stats'].indexOf(id)].classList.add('active');
  currentTab = id;
  if (id === 'week')  renderWeek();
  if (id === 'month') renderMonth();
  if (id === 'stats') renderStats();
}

// ── XP ──
function getLevel() { return Math.floor(state.totalXp / 300) + 1; }
function getXpInLevel() { return state.totalXp % 300; }

function calcStreak() {
  let streak = 0, d = todayKey();
  while (true) {
    const dow = dayOfWeek(d);
    // skip Sunday (rest day)
    if (dow === 'Sun') { d = addDays(d, -1); continue; }
    if (state.completedDays[d]) { streak++; d = addDays(d, -1); }
    else break;
  }
  return streak;
}

function getWeekDoneCount(weekStart) {
  let count = 0;
  for (let i = 0; i < 7; i++) {
    const dk = addDays(weekStart, i);
    if (state.completedDays[dk]) count++;
  }
  return count;
}

function updateXpPanel() {
  const lvl = getLevel(), xpIn = getXpInLevel();
  const ws = getWeekStart(todayKey());
  document.getElementById('levelVal').textContent = lvl;
  document.getElementById('doneCount').textContent = Object.keys(state.completedDays).length;
  document.getElementById('streakVal').textContent = state.streak;
  document.getElementById('weekCount').textContent = getWeekDoneCount(ws);
  document.getElementById('xpBarFill').style.width = Math.round((xpIn/300)*100) + '%';
  document.getElementById('xpLabel').textContent = `${xpIn}/300 XP`;
}

// ── Today tab ──
function renderDateNav() {
  const dk = state.activeDate;
  const isToday = dk === todayKey();
  const isFuture = dk > todayKey();
  const dow = dayOfWeek(dk);
  document.getElementById('dateNav').innerHTML = `
    <button class="date-nav-btn" onclick="shiftDay(-1)">← Prev</button>
    <div class="date-nav-center">
      <div class="date-nav-main">${KANJI[dow]} ${formatDate(dk)}</div>
      <div class="date-nav-sub">${dow.toUpperCase()}</div>
      ${!isToday ? `<span class="today-btn" onclick="goToday()">Go to Today</span>` : ''}
    </div>
    <button class="date-nav-btn" onclick="shiftDay(1)" ${isFuture?'disabled style="opacity:.4"':''}>Next →</button>
  `;
}

function shiftDay(n) {
  const next = addDays(state.activeDate, n);
  if (next > todayKey()) return;
  state.activeDate = next;
  renderToday();
}
function goToday() {
  state.activeDate = todayKey();
  renderToday();
}

function renderDayHeader() {
  const dk = state.activeDate;
  const dow = dayOfWeek(dk);
  const wd = PLAN[dow];
  const isDone = !!state.completedDays[dk];
  document.getElementById('dayHeader').innerHTML = `
    <div class="day-badge" style="color:${wd.color}">${wd.badge}</div>
    <div>
      <div class="day-type-name">${wd.type}</div>
      <div class="day-sub">${dk === todayKey() ? '本日の修行' : formatDate(dk)}</div>
    </div>
    ${isDone ? `<div class="done-tag">完了 ✓</div>` : ''}
  `;
}

function renderExercises() {
  const dk = state.activeDate;
  const dow = dayOfWeek(dk);
  const wd = PLAN[dow];
  const list = document.getElementById('exerciseList');

  if (dow === 'Sun') {
    list.innerHTML = `<div class="rest-msg"><div class="rest-icon">🌸</div><div>完全休息 · Full Rest Day</div><div style="font-size:11px;color:var(--text-muted);margin-top:6px;font-family:DM Mono,monospace">Sleep well. Let your body recover.</div></div>`;
    return;
  }

  const isFuture = dk > todayKey();
  list.innerHTML = '';

  wd.exercises.forEach((ex, ei) => {
    const card = document.createElement('div');
    card.className = 'exercise-card';
    const setsLabel = ex.sets > 0 ? `${ex.sets} × ${ex.reps}` : ex.reps;
    let circlesHTML = '';
    if (ex.sets > 0 && !isFuture) {
      circlesHTML = '<div class="set-circles">';
      for (let si = 0; si < ex.sets; si++) {
        const key = `${dk}_${ei}_${si}`;
        const done = !!state.completedSets[key];
        circlesHTML += `<button class="set-circle${done?' done':''}" onclick="toggleSet('${dk}',${ei},${si})">${done?'✓':''}</button>`;
      }
      circlesHTML += '</div>';
    } else if (isFuture && ex.sets > 0) {
      circlesHTML = `<div style="font-size:11px;color:var(--text-muted);font-family:DM Mono,monospace">${ex.sets} sets planned</div>`;
    }
    card.innerHTML = `
      <div class="exercise-top">
        <span class="exercise-name">${ex.name}</span>
        <span class="exercise-sets-label">${setsLabel}</span>
      </div>
      ${circlesHTML}
    `;
    list.appendChild(card);
  });
}

function renderToday() {
  renderDateNav();
  renderDayHeader();
  renderExercises();
  updateXpPanel();
}

function toggleSet(dk, ei, si) {
  const key = `${dk}_${ei}_${si}`;
  state.completedSets[key] = !state.completedSets[key];

  const dow = dayOfWeek(dk);
  const dayEx = PLAN[dow].exercises;
  let totalSets = 0, doneSets = 0;
  dayEx.forEach((ex, i) => {
    if (ex.sets > 0) {
      totalSets += ex.sets;
      for (let s = 0; s < ex.sets; s++) {
        if (state.completedSets[`${dk}_${i}_${s}`]) doneSets++;
      }
    }
  });

  const allDone = doneSets === totalSets && totalSets > 0;
  state.partialDays[dk] = totalSets > 0 ? Math.round((doneSets/totalSets)*100) : 0;

  if (allDone && !state.completedDays[dk]) {
    state.completedDays[dk] = Date.now();
    state.totalXp += 100;
    state.streak = calcStreak();
    // weekly bonus
    const ws = getWeekStart(dk);
    if (getWeekDoneCount(ws) === 6) { state.totalXp += 50; }
  } else if (!allDone && state.completedDays[dk]) {
    delete state.completedDays[dk];
    state.totalXp = Math.max(0, state.totalXp - 100);
    state.streak = calcStreak();
  }

  saveState();
  renderExercises();
  renderDayHeader();
  updateXpPanel();
}

// ── Week tab ──
function renderWeek() {
  const ws = state.viewWeekStart || getWeekStart(todayKey());
  state.viewWeekStart = ws;
  const we = addDays(ws, 6);
  const todayWs = getWeekStart(todayKey());
  const isCurrentWeek = ws === todayWs;

  document.getElementById('weekNav').innerHTML = `
    <button class="week-nav-btn" onclick="shiftWeek(-1)">← Prev</button>
    <span class="week-nav-label">${formatDate(ws)} – ${formatDate(we)}</span>
    <button class="week-nav-btn" onclick="shiftWeek(1)" ${ws >= todayWs?'disabled style="opacity:.4"':''}>Next →</button>
  `;
  document.getElementById('weekLabel').textContent = isCurrentWeek ? '今週の修行' : `Week of ${formatDate(ws)}`;

  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const dk = addDays(ws, i);
    const dow = dayOfWeek(dk);
    const wd = PLAN[dow];
    const isDone = !!state.completedDays[dk];
    const isFuture = dk > todayKey();
    const partial = state.partialDays[dk] || 0;

    const card = document.createElement('div');
    card.className = `week-card${isDone?' done':''}${isFuture?' future':''}`;
    card.innerHTML = `
      <div class="week-card-top">
        <div class="week-kanji">${KANJI[dow]}</div>
        <div class="week-badge" style="color:${wd.color}">${wd.badge}</div>
      </div>
      <div class="week-type">${wd.type}</div>
      <div class="week-meta">${dow} · ${dk === todayKey()?'Today':formatDate(dk).split(' ').slice(0,2).join(' ')}</div>
      <div class="week-progress-bar"><div class="week-progress-fill" style="width:${isDone?100:partial}%"></div></div>
      ${isDone ? `<div class="week-done-label">完了 ✓</div>` : partial > 0 ? `<div class="week-done-label" style="color:rgba(255,183,197,.5)">${partial}% done</div>` : ''}
    `;
    if (!isFuture) {
      card.onclick = () => { state.activeDate = dk; switchTab('today'); };
    }
    grid.appendChild(card);
  }
}

function shiftWeek(n) {
  const todayWs = getWeekStart(todayKey());
  const next = addDays(state.viewWeekStart, n * 7);
  if (next > todayWs) return;
  state.viewWeekStart = next;
  renderWeek();
}

// ── Month tab ──
function renderMonth() {
  const { year, month } = state.viewMonth;
  const now = new Date();
  const isCurrentMonth = year === now.getFullYear() && month === now.getMonth();

  document.getElementById('monthHeader').innerHTML = `
    <button class="month-nav-btn" onclick="shiftMonth(-1)">← Prev</button>
    <div class="month-title">${MONTH_JP[month]} · ${MONTHS[month]} ${year}</div>
    <button class="month-nav-btn" onclick="shiftMonth(1)" ${isCurrentMonth?'disabled style="opacity:.4"':''}>Next →</button>
  `;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['月','火','水','木','金','土','日'].forEach(k => {
    const el = document.createElement('div');
    el.className = 'cal-day-name'; el.textContent = k;
    grid.appendChild(el);
  });

  const firstDay = new Date(year, month, 1);
  let startOffset = firstDay.getDay(); // 0=Sun
  startOffset = startOffset === 0 ? 6 : startOffset - 1; // Mon=0

  for (let i = 0; i < startOffset; i++) {
    const el = document.createElement('div');
    el.className = 'cal-cell empty';
    grid.appendChild(el);
  }

  const daysInMonth = new Date(year, month+1, 0).getDate();
  let doneCount = 0, partialCount = 0, totalActive = 0;

  for (let d = 1; d <= daysInMonth; d++) {
    const dk = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = dayOfWeek(dk);
    const isFuture = dk > todayKey();
    const isToday = dk === todayKey();
    const isDone = !!state.completedDays[dk];
    const partial = state.partialDays[dk] || 0;
    const isRest = dow === 'Sun';

    const el = document.createElement('div');
    let cls = 'cal-cell';
    if (isFuture) cls += ' future-cell';
    else if (isRest) cls += ' rest-cell';
    else if (isDone) { cls += ' done-cell'; doneCount++; }
    else if (partial > 0) { cls += ' partial-cell'; partialCount++; }
    if (isToday) cls += ' today-cell';
    el.className = cls;
    el.innerHTML = `<span class="cal-num">${d}</span>${isDone?'<div class="cal-dot"></div>':''}`;
    if (!isFuture && !isRest) {
      el.style.cursor = 'pointer';
      el.onclick = () => { state.activeDate = dk; switchTab('today'); };
    }
    grid.appendChild(el);
    if (!isFuture && !isRest) totalActive++;
  }

  document.getElementById('monthStats').innerHTML = `
    <div class="m-stat"><div class="m-stat-val" style="color:var(--green)">${doneCount}</div><div class="m-stat-label">Completed</div></div>
    <div class="m-stat"><div class="m-stat-val" style="color:var(--gold)">${partialCount}</div><div class="m-stat-label">Partial</div></div>
    <div class="m-stat"><div class="m-stat-val" style="color:var(--text-dim)">${totalActive - doneCount - partialCount}</div><div class="m-stat-label">Missed</div></div>
  `;
}

function shiftMonth(n) {
  let { year, month } = state.viewMonth;
  month += n;
  if (month > 11) { month = 0; year++; }
  if (month < 0)  { month = 11; year--; }
  const now = new Date();
  if (year > now.getFullYear() || (year === now.getFullYear() && month > now.getMonth())) return;
  state.viewMonth = { year, month };
  renderMonth();
}

// ── Stats tab ──
function renderStats() {
  renderProfileCard();
  renderIntensityCard();
  renderWeightDisplay();
  renderStatCards();
  renderLevelBar();
}

function renderProfileCard() {
  const p = profile;
  const bmi = p.bmi;
  const bmiCat = bmi < 18.5 ? ['Underweight','#5c8fe0'] : bmi < 25 ? ['Normal','#5cb87a'] : bmi < 30 ? ['Overweight','#d4a017'] : ['Obese','#e05c5c'];
  document.getElementById('profileRow').innerHTML = `
    <div class="profile-item"><div class="profile-val">${p.height} cm</div><div class="profile-label">HEIGHT</div></div>
    <div class="profile-item"><div class="profile-val">${p.weight} kg</div><div class="profile-label">WEIGHT</div></div>
    <div class="profile-item"><div class="profile-val">${p.age}</div><div class="profile-label">AGE</div></div>
    <div class="profile-item"><div class="bmi-badge" style="background:rgba(${hexToRgb(bmiCat[1])},0.15);border-color:rgba(${hexToRgb(bmiCat[1])},0.4);color:${bmiCat[1]}">${bmi.toFixed(1)} · ${bmiCat[0]}</div><div class="profile-label">BMI</div></div>
  `;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function renderIntensityCard() {
  const p = profile;
  const chips = [
    [p.level.charAt(0).toUpperCase()+p.level.slice(1), p.level==='beginner'?'#5cb87a':p.level==='advanced'?'#e05c5c':'#d4a017'],
    [p.goal==='lose'?'Fat Loss':p.goal==='gain'?'Muscle Gain':p.goal==='endurance'?'Endurance':'Recomp', '#5c8fe0'],
  ];
  document.getElementById('intensityRow').innerHTML = chips.map(([label,col]) =>
    `<span class="intensity-chip" style="background:rgba(${hexToRgb(col)},0.12);border-color:rgba(${hexToRgb(col)},0.35);color:${col}">${label}</span>`
  ).join('');
}

function renderWeightDisplay() {
  const container = document.getElementById('weightDisplay');
  if (state.weight.length === 0) {
    container.innerHTML = `<div class="weight-empty">体重を記録してください</div>`; return;
  }
  const recent = state.weight.slice(-10);
  const vals = recent.map(w => w.val);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  let bars = '';
  recent.forEach((w, i) => {
    const h = Math.round(20 + ((w.val-min)/range)*55);
    bars += `<div class="weight-bar-col"><div class="weight-bar-val">${w.val}</div><div class="weight-bar${i===recent.length-1?' latest':''}" style="height:${h}px"></div></div>`;
  });
  const latest = state.weight[state.weight.length-1].val;
  const start = state.weight[0].val;
  const goalW = profile.goal === 'lose' ? Math.round(profile.weight * 0.9) : profile.goal === 'gain' ? Math.round(profile.weight * 1.1) : profile.weight;
  const progress = profile.goal === 'lose'
    ? Math.min(100, Math.max(0, Math.round(((start-latest)/(start-goalW))*100)))
    : Math.min(100, Math.max(0, Math.round(((latest-start)/(goalW-start))*100)));
  container.innerHTML = `
    <div class="weight-chart">${bars}</div>
    <div class="weight-footer"><span>Start: ${start} kg</span><span>Latest: ${latest} kg</span><span>Goal: ${goalW} kg</span></div>
    <div style="margin-top:10px">
      <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${progress}%;background:linear-gradient(90deg,rgba(255,183,197,.6),#ffb7c5)"></div></div>
      <div class="weight-gain-label">${progress}% toward weight goal</div>
    </div>
  `;
}

function renderStatCards() {
  const items = [
    ['修練完了','Workouts done', Object.keys(state.completedDays).length, '#ffb7c5'],
    ['連続日数','Day streak', state.streak, '#9b59b6'],
    ['経験値','Total XP', state.totalXp, '#d4a017'],
    ['レベル','Level', getLevel(), '#5c8fe0'],
  ];
  document.getElementById('statsGrid').innerHTML = items.map(([jp,en,val,col]) =>
    `<div class="stat-card"><div class="stat-val" style="color:${col}">${val}</div><div class="stat-jp">${jp}</div><div class="stat-en">${en}</div></div>`
  ).join('');
}

function renderLevelBar() {
  const lvl = getLevel(), xpIn = getXpInLevel();
  document.getElementById('levelBarFill').style.width = Math.round((xpIn/300)*100)+'%';
  document.getElementById('lvLeft').textContent = `Lv ${lvl}`;
  document.getElementById('lvMid').textContent = `${300-xpIn} XP to next level`;
  document.getElementById('lvRight').textContent = `Lv ${lvl+1}`;
}

function addWeight() {
  const input = document.getElementById('weightInput');
  const val = parseFloat(input.value);
  if (isNaN(val)||val<30||val>200) return;
  state.weight.push({ val, date: new Date().toLocaleDateString() });
  if (state.weight.length > 12) state.weight = state.weight.slice(-12);
  input.value = '';
  saveState();
  renderWeightDisplay();
}

document.getElementById('weightInput').addEventListener('keydown', e => { if (e.key==='Enter') addWeight(); });

// ── Boot ──
const savedProfile = loadProfile();
if (savedProfile) {
  initApp(savedProfile);
} else {
  document.getElementById('app').style.display = 'none';
}
</script>
</body>
</html>
